<!DOCTYPE html>
<html>
<head>
  <title>SBHS Certificate Verification</title>
  <style>
    body { font-family: Arial; background:#eef2f7; text-align:center; padding:40px; }
    .box { background:white; max-width:650px; margin:auto; padding:25px; border-radius:12px; }
    .valid { color:green; font-size:22px; font-weight:bold; }
    .invalid { color:red; font-size:22px; font-weight:bold; }
    .info { text-align:left; margin-top:20px; }
  </style>
</head>

<body>
<div class="box">
  <h1>Certificate Verification</h1>
  <div id="result"></div>
</div>

<script>
const certs = {
  "SBHS-G7LAC-2026-001": "Imelda A. Dorado",
  "SBHS-G7LAC-2026-002": "Jhonel V. David",
  "SBHS-G7LAC-2026-003": "Theresa M. Decena",
  "SBHS-G7LAC-2026-004": "Joyce L. Abugan",
  "SBHS-G7LAC-2026-005": "Cherry D. Balona",
  "SBHS-G7LAC-2026-006": "Jonalyn S. Capalungan",
  "SBHS-G7LAC-2026-007": "Filipinas L. Demaosa",
  "SBHS-G7LAC-2026-008": "Sofia M. Toraldo"
};

const id = new URLSearchParams(window.location.search).get("id");

const r = document.getElementById("result");

if (certs[id]) {
  r.innerHTML = `
    <p class="valid">✔ VERIFIED</p>
    <div class="info">
      <p><b>ID:</b> ${id}</p>
      <p><b>Name:</b> ${certs[id]}</p>
      <p><b>School:</b> San Bartolome High School</p>
      <p><b>Topic:</b> ILAW Lesson Plan Framework</p>
      <p><b>Speaker:</b> Mrs. Imelda A. Dorado</p>
      <p><b>Date:</b> July 3, 2026</p>
      <p><b>Issued by:</b> Jhonel V. David</p>
    </div>
  `;
} else {
  r.innerHTML = `<p class="invalid">INVALID CERTIFICATE</p>`;
}
</script>

</body>
</html>
